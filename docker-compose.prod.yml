# Production stack — all four services in one compose file.
# Usage:
#   cp .env.production.example .env.production
#   # Edit .env.production with real secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#   docker exec plm-backend sh -c "npm run seed:demo -w @plm/backend"  # optional seed

services:

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: plm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-plm_project}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plm_project}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Queue ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: plm-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (Express + Prisma) ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: plm-backend
    restart: unless-stopped
    environment:
      NODE_ENV:      production
      PORT:          4000
      DATABASE_URL:  postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plm_project}
      REDIS_URL:     redis://redis:6379
      JWT_SECRET:    ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FILES_ROOT:    ./packages/backend/storage
    volumes:
      - plm_storage:/app/packages/backend/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No port exposed externally — nginx proxies /api to this container

  # ── Frontend (Nginx + React SPA) ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Relative /api works because nginx proxies /api → backend:4000
        VITE_API_URL: /api
    container_name: plm-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  plm_storage:
