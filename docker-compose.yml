version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: plm-postgres
    environment:
      POSTGRES_DB: plm_project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: plm-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
