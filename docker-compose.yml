# Dev-only infra — starts Postgres and Redis for local development.
# The frontend and backend run outside Docker (npm run dev).

services:
  postgres:
    image: postgres:16
    container_name: plm-postgres
    environment:
      POSTGRES_DB: plm_project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plm_project"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: plm-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
