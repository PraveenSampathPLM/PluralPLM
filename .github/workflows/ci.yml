name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plm_project
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/plm_project
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 1h
      PORT: 4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Prisma Generate
        run: npm run prisma:generate -w @plm/backend
      - name: Prisma Migrate
        run: npm run prisma:deploy -w @plm/backend
      - name: Lint
        run: npm run lint -ws
      - name: Typecheck
        run: npm run typecheck -ws
      - name: Build
        run: npm run build -ws
      - name: API Smoke Test
        run: |
          node packages/backend/dist/server.js &
          sleep 3
          curl -fsS http://localhost:4000/health
