<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0B1929"/>
      <stop offset="100%" stop-color="#0F2027"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF9933" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#138808" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1E3A47" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200"  y1="0" x2="200"  y2="400"/>
    <line x1="400"  y1="0" x2="400"  y2="400"/>
    <line x1="600"  y1="0" x2="600"  y2="400"/>
    <line x1="800"  y1="0" x2="800"  y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Large decorative ring — right side -->
  <circle cx="980" cy="200" r="240" stroke="#1E3A47" stroke-width="1" opacity="0.5"/>
  <circle cx="980" cy="200" r="180" stroke="#1E3A47" stroke-width="0.8" opacity="0.4"/>
  <circle cx="980" cy="200" r="120" stroke="#263D4A" stroke-width="0.8" opacity="0.6"/>

  <!-- Tricolor dot accents on large ring -->
  <circle cx="980" cy="-40"  r="8" fill="#FF9933" opacity="0.7"/>
  <circle cx="1188" cy="320" r="8" fill="#138808" opacity="0.7"/>
  <circle cx="772"  cy="320" r="8" fill="#1A237E" opacity="0.9"/>
  <!-- connecting lines -->
  <line x1="980" y1="-40" x2="980" y2="200" stroke="#FF9933" stroke-width="0.5" opacity="0.2"/>
  <line x1="1188" y1="320" x2="980" y2="200" stroke="#138808" stroke-width="0.5" opacity="0.2"/>
  <line x1="772"  y1="320" x2="980" y2="200" stroke="#1A237E" stroke-width="0.5" opacity="0.2"/>
  <!-- Centre nucleus -->
  <circle cx="980" cy="200" r="18" fill="#1A237E" opacity="0.6"/>
  <circle cx="980" cy="200" r="10" fill="#263D60" opacity="0.8"/>
  <circle cx="980" cy="200" r="5"  fill="#60A5FA" opacity="0.6"/>

  <!-- ══════════════════════════════ -->
  <!-- LOGO MARK — left content area -->
  <!-- ══════════════════════════════ -->

  <!-- Icon ring -->
  <circle cx="148" cy="170" r="52" stroke="#2A4A5A" stroke-width="2"/>
  <!-- Saffron dot top -->
  <circle cx="148" cy="118" r="14" fill="#FF9933"/>
  <!-- Green dot bottom-right -->
  <circle cx="193" cy="196" r="14" fill="#138808"/>
  <!-- Navy dot bottom-left -->
  <circle cx="103" cy="196" r="14" fill="#3B5EDB"/>
  <!-- Nucleus -->
  <circle cx="148" cy="170" r="10" fill="#1A237E"/>
  <circle cx="148" cy="170" r="5"  fill="#60A5FA" opacity="0.8"/>

  <!-- TATVA wordmark -->
  <text x="220" y="165"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="72" font-weight="900" letter-spacing="10"
    fill="white">TATVA</text>

  <!-- Subtitle -->
  <text x="222" y="195"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="15" font-weight="400" letter-spacing="5"
    fill="#64B5D9">PRODUCT LIFECYCLE MANAGEMENT</text>

  <!-- Saffron underline -->
  <line x1="222" y1="207" x2="700" y2="207" stroke="#FF9933" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Tagline -->
  <text x="222" y="255"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="18" font-weight="300" letter-spacing="0.5"
    fill="#94A3B8">Purpose-built for process industries — food &amp; beverage,</text>
  <text x="222" y="278"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="18" font-weight="300" letter-spacing="0.5"
    fill="#94A3B8">chemical, CPG, paint, rubber and polymer manufacturing.</text>

  <!-- Tricolor bottom accent bar -->
  <rect x="0"   y="392" width="400" height="8" fill="#FF9933"/>
  <rect x="400" y="392" width="400" height="8" fill="white"/>
  <rect x="800" y="392" width="400" height="8" fill="#138808"/>

</svg>
