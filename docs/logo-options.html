<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Tatva — Logo Options</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F8F9FA; font-family: 'Inter', sans-serif; padding: 48px; }
    h1 { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .card {
      background: white; border-radius: 16px; padding: 48px 40px 36px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      display: flex; flex-direction: column; align-items: flex-start; gap: 32px;
    }
    .card-label {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: #AAA; border-top: 1px solid #F0F0F0; width: 100%; padding-top: 16px;
    }
    .dark { background: #0F172A; }
    .dark .card-label { color: #555; border-color: #1E293B; }
    .variants { display: flex; gap: 24px; align-items: center; }
  </style>
</head>
<body>
<h1>Tatva — Logo Options</h1>
<div class="grid">

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- OPTION A: Minimal dot-ring atom                       -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div class="card">
    <!-- Full logo -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" fill="none">
      <!-- Ring -->
      <circle cx="36" cy="36" r="26" stroke="#E8E8E8" stroke-width="1.5"/>
      <!-- Three tricolor dots on ring at 90°, 210°, 330° -->
      <!-- Saffron: 270° → (36, 36-26) = (36, 10) -->
      <circle cx="36" cy="10" r="7" fill="#FF9933"/>
      <!-- Green: 30° → (36+26·cos30, 36+26·sin30) = (36+22.5, 36+13) = (58.5, 49) -->
      <circle cx="58.5" cy="49" r="7" fill="#138808"/>
      <!-- Navy: 150° → (36+26·cos150, 36+26·sin150) = (36-22.5, 49) = (13.5, 49) -->
      <circle cx="13.5" cy="49" r="7" fill="#1A237E"/>
      <!-- Centre nucleus -->
      <circle cx="36" cy="36" r="5" fill="#1A237E"/>
      <circle cx="36" cy="36" r="2.5" fill="white"/>
      <!-- Wordmark -->
      <text x="82" y="30" font-family="'Inter', sans-serif" font-size="28" font-weight="900" letter-spacing="6" fill="#0F172A">TATVA</text>
      <text x="83" y="50" font-family="'Inter', sans-serif" font-size="9.5" font-weight="400" letter-spacing="2.5" fill="#94A3B8">PRODUCT LIFECYCLE MANAGEMENT</text>
      <!-- Saffron-green thin underline -->
      <line x1="83" y1="56" x2="200" y2="56" stroke="#FF9933" stroke-width="1.5"/>
      <line x1="200" y1="56" x2="310" y2="56" stroke="#138808" stroke-width="1.5"/>
    </svg>

    <!-- Icon only + dark bg variant -->
    <div class="variants">
      <!-- Icon only -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="48" height="48" fill="none">
        <circle cx="36" cy="36" r="26" stroke="#E8E8E8" stroke-width="1.5"/>
        <circle cx="36" cy="10" r="7" fill="#FF9933"/>
        <circle cx="58.5" cy="49" r="7" fill="#138808"/>
        <circle cx="13.5" cy="49" r="7" fill="#1A237E"/>
        <circle cx="36" cy="36" r="5" fill="#1A237E"/>
        <circle cx="36" cy="36" r="2.5" fill="white"/>
      </svg>
      <!-- On dark -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="48" height="48" fill="none" style="background:#0F172A;border-radius:10px;padding:4px">
        <circle cx="36" cy="36" r="26" stroke="#334155" stroke-width="1.5"/>
        <circle cx="36" cy="10" r="7" fill="#FF9933"/>
        <circle cx="58.5" cy="49" r="7" fill="#22C55E"/>
        <circle cx="13.5" cy="49" r="7" fill="#60A5FA"/>
        <circle cx="36" cy="36" r="5" fill="#60A5FA"/>
        <circle cx="36" cy="36" r="2.5" fill="#0F172A"/>
      </svg>
    </div>

    <div class="card-label">Option A — Minimal Dot Ring</div>
  </div>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- OPTION B: Hexagon molecule cluster                    -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div class="card">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" fill="none">
      <!-- Three hexagons arranged as a triangle molecule -->
      <!-- Hex centres: top (36,16), bottom-left (20,44), bottom-right (52,44) -->
      <!-- Bond lines -->
      <line x1="36" y1="16" x2="20" y2="44" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
      <line x1="36" y1="16" x2="52" y2="44" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="44" x2="52" y2="44" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
      <!-- Saffron hexagon top -->
      <polygon points="36,5 44,10 44,22 36,27 28,22 28,10" fill="#FF9933"/>
      <!-- Navy hexagon bottom-left -->
      <polygon points="20,33 28,38 28,50 20,55 12,50 12,38" fill="#1A237E"/>
      <!-- Green hexagon bottom-right -->
      <polygon points="52,33 60,38 60,50 52,55 44,50 44,38" fill="#138808"/>
      <!-- Wordmark -->
      <text x="82" y="30" font-family="'Inter', sans-serif" font-size="28" font-weight="900" letter-spacing="6" fill="#0F172A">TATVA</text>
      <text x="83" y="50" font-family="'Inter', sans-serif" font-size="9.5" font-weight="400" letter-spacing="2.5" fill="#94A3B8">PRODUCT LIFECYCLE MANAGEMENT</text>
      <rect x="83" y="56" width="226" height="1.5" rx="0.75" fill="#1A237E" opacity="0.2"/>
    </svg>

    <div class="variants">
      <svg viewBox="0 0 72 72" width="48" height="48" fill="none">
        <line x1="36" y1="16" x2="20" y2="44" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
        <line x1="36" y1="16" x2="52" y2="44" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="44" x2="52" y2="44" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
        <polygon points="36,5 44,10 44,22 36,27 28,22 28,10" fill="#FF9933"/>
        <polygon points="20,33 28,38 28,50 20,55 12,50 12,38" fill="#1A237E"/>
        <polygon points="52,33 60,38 60,50 52,55 44,50 44,38" fill="#138808"/>
      </svg>
      <svg viewBox="0 0 72 72" width="48" height="48" fill="none" style="background:#0F172A;border-radius:10px;padding:4px">
        <line x1="36" y1="16" x2="20" y2="44" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
        <line x1="36" y1="16" x2="52" y2="44" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="44" x2="52" y2="44" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
        <polygon points="36,5 44,10 44,22 36,27 28,22 28,10" fill="#FF9933"/>
        <polygon points="20,33 28,38 28,50 20,55 12,50 12,38" fill="#1E3A8A"/>
        <polygon points="52,33 60,38 60,50 52,55 44,50 44,38" fill="#15803D"/>
      </svg>
    </div>
    <div class="card-label">Option B — Hexagon Molecule</div>
  </div>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- OPTION C: Tricolor flask                              -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div class="card">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" fill="none">
      <!-- Flask outline -->
      <path d="M28,8 L28,30 L10,58 C8,63 11,70 17,70 L55,70 C61,70 64,63 62,58 L44,30 L44,8 Z"
            fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linejoin="round"/>
      <!-- Flask mouth -->
      <rect x="24" y="6" width="24" height="5" rx="2.5" fill="#CBD5E1"/>
      <!-- Tricolor liquid fill clipped to flask -->
      <clipPath id="flask">
        <path d="M28,8 L28,30 L10,58 C8,63 11,70 17,70 L55,70 C61,70 64,63 62,58 L44,30 L44,8 Z"/>
      </clipPath>
      <!-- Green bottom band -->
      <rect x="0" y="50" width="72" height="22" fill="#138808" opacity="0.85" clip-path="url(#flask)"/>
      <!-- White middle band -->
      <rect x="0" y="36" width="72" height="16" fill="#F1F5F9" clip-path="url(#flask)"/>
      <!-- Saffron top band -->
      <rect x="0" y="22" width="72" height="16" fill="#FF9933" opacity="0.85" clip-path="url(#flask)"/>
      <!-- Bubble dots -->
      <circle cx="24" cy="62" r="3" fill="white" opacity="0.5" clip-path="url(#flask)"/>
      <circle cx="38" cy="57" r="2" fill="white" opacity="0.4" clip-path="url(#flask)"/>
      <!-- Wordmark -->
      <text x="86" y="36" font-family="'Inter', sans-serif" font-size="28" font-weight="900" letter-spacing="6" fill="#0F172A">TATVA</text>
      <text x="87" y="56" font-family="'Inter', sans-serif" font-size="9.5" font-weight="400" letter-spacing="2.5" fill="#94A3B8">PRODUCT LIFECYCLE MANAGEMENT</text>
      <!-- Tricolor bar under text -->
      <rect x="87" y="63" width="75" height="2" rx="1" fill="#FF9933"/>
      <rect x="162" y="63" width="75" height="2" rx="1" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
      <rect x="237" y="63" width="75" height="2" rx="1" fill="#138808"/>
    </svg>

    <div class="variants">
      <svg viewBox="0 0 72 80" width="43" height="48" fill="none">
        <clipPath id="flask2">
          <path d="M28,8 L28,30 L10,58 C8,63 11,70 17,70 L55,70 C61,70 64,63 62,58 L44,30 L44,8 Z"/>
        </clipPath>
        <path d="M28,8 L28,30 L10,58 C8,63 11,70 17,70 L55,70 C61,70 64,63 62,58 L44,30 L44,8 Z" fill="none" stroke="#CBD5E1" stroke-width="2"/>
        <rect x="24" y="6" width="24" height="5" rx="2.5" fill="#CBD5E1"/>
        <rect x="0" y="50" width="72" height="22" fill="#138808" clip-path="url(#flask2)"/>
        <rect x="0" y="36" width="72" height="16" fill="#F8FAFC" clip-path="url(#flask2)"/>
        <rect x="0" y="22" width="72" height="16" fill="#FF9933" clip-path="url(#flask2)"/>
      </svg>
      <svg viewBox="0 0 72 80" width="43" height="48" fill="none" style="background:#0F172A;border-radius:10px;padding:4px">
        <clipPath id="flask3">
          <path d="M28,8 L28,30 L10,58 C8,63 11,70 17,70 L55,70 C61,70 64,63 62,58 L44,30 L44,8 Z"/>
        </clipPath>
        <path d="M28,8 L28,30 L10,58 C8,63 11,70 17,70 L55,70 C61,70 64,63 62,58 L44,30 L44,8 Z" fill="none" stroke="#334155" stroke-width="2"/>
        <rect x="24" y="6" width="24" height="5" rx="2.5" fill="#334155"/>
        <rect x="0" y="50" width="72" height="22" fill="#15803D" clip-path="url(#flask3)"/>
        <rect x="0" y="36" width="72" height="16" fill="#1E293B" clip-path="url(#flask3)"/>
        <rect x="0" y="22" width="72" height="16" fill="#FF9933" clip-path="url(#flask3)"/>
      </svg>
    </div>
    <div class="card-label">Option C — Tricolor Flask</div>
  </div>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- OPTION D: Monogram T with element box                 -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div class="card">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" fill="none">
      <!-- Element box (periodic table style) -->
      <rect x="4" y="4" width="62" height="62" rx="8" fill="#1A237E"/>
      <!-- Atomic number -->
      <text x="10" y="18" font-family="'Inter', sans-serif" font-size="9" font-weight="300" fill="#93C5FD">6</text>
      <!-- Element symbol T -->
      <text x="11" y="50" font-family="'Inter', sans-serif" font-size="34" font-weight="900" fill="white">T</text>
      <!-- Tricolor bottom stripe -->
      <rect x="4"  y="57" width="21" height="9" rx="0" fill="#FF9933"/>
      <rect x="25" y="57" width="20" height="9" fill="white" opacity="0.9"/>
      <rect x="45" y="57" width="21" height="9" rx="0" fill="#138808"/>
      <!-- Clip corners of stripe -->
      <rect x="4"  y="57" width="62" height="9" rx="0 0 8 8" fill="none"/>
      <!-- Element name -->
      <text x="36" y="67" font-family="'Inter', sans-serif" font-size="7" font-weight="400" fill="#93C5FD" text-anchor="middle">Tatva</text>

      <!-- Wordmark -->
      <text x="84" y="30" font-family="'Inter', sans-serif" font-size="28" font-weight="900" letter-spacing="6" fill="#0F172A">TATVA</text>
      <!-- Tricolor underline -->
      <rect x="84"  y="36" width="50" height="2" rx="1" fill="#FF9933"/>
      <rect x="134" y="36" width="50" height="2" rx="1" fill="#1A237E"/>
      <rect x="184" y="36" width="50" height="2" rx="1" fill="#138808"/>
      <text x="85" y="54" font-family="'Inter', sans-serif" font-size="9.5" font-weight="400" letter-spacing="2.5" fill="#94A3B8">PRODUCT LIFECYCLE MANAGEMENT</text>
    </svg>

    <div class="variants">
      <svg viewBox="0 0 70 70" width="48" height="48" fill="none">
        <rect x="4" y="4" width="62" height="62" rx="8" fill="#1A237E"/>
        <text x="10" y="18" font-family="'Inter', sans-serif" font-size="9" font-weight="300" fill="#93C5FD">6</text>
        <text x="11" y="50" font-family="'Inter', sans-serif" font-size="34" font-weight="900" fill="white">T</text>
        <rect x="4"  y="57" width="21" height="9" fill="#FF9933"/>
        <rect x="25" y="57" width="20" height="9" fill="white" opacity="0.9"/>
        <rect x="45" y="57" width="21" height="9" fill="#138808"/>
        <text x="36" y="67" font-family="'Inter', sans-serif" font-size="7" fill="#93C5FD" text-anchor="middle">Tatva</text>
      </svg>
      <svg viewBox="0 0 70 70" width="48" height="48" fill="none" style="background:#0F172A;border-radius:10px;padding:4px">
        <rect x="4" y="4" width="62" height="62" rx="8" fill="#1E3A8A"/>
        <text x="10" y="18" font-family="'Inter', sans-serif" font-size="9" font-weight="300" fill="#93C5FD">6</text>
        <text x="11" y="50" font-family="'Inter', sans-serif" font-size="34" font-weight="900" fill="white">T</text>
        <rect x="4"  y="57" width="21" height="9" fill="#FF9933"/>
        <rect x="25" y="57" width="20" height="9" fill="#1E293B"/>
        <rect x="45" y="57" width="21" height="9" fill="#15803D"/>
        <text x="36" y="67" font-family="'Inter', sans-serif" font-size="7" fill="#93C5FD" text-anchor="middle">Tatva</text>
      </svg>
    </div>
    <div class="card-label">Option D — Periodic Element Box</div>
  </div>

</div>

<p style="margin-top:32px;font-size:12px;color:#aaa;">Each option shows: full logo · icon only · icon on dark background</p>
</body>
</html>
